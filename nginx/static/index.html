<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestPlatform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080c14;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .bg { position: fixed; inset: 0; z-index: 0; }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.30;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .b1 { width: 520px; height: 520px; background: #4a11c0; top: -120px; left: -120px; animation-delay: 0s; }
    .b2 { width: 420px; height: 420px; background: #0c4ecf; bottom: -100px; right: -100px; animation-delay: -5s; }
    .b3 { width: 320px; height: 320px; background: #0a8a6e; top: 45%; left: 55%; animation-delay: -9s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, 35px) scale(1.1); }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.8rem 2.4rem 2.4rem;
      width: 360px;
      text-align: center;
      box-shadow: 0 12px 64px rgba(0,0,0,0.6);
    }

    .logo {
      width: 52px; height: 52px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
      letter-spacing: 0.01em;
    }

    .tagline {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      margin-bottom: 2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .links { display: flex; flex-direction: column; gap: 0.65rem; }

    a {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      font-size: 0.88rem;
      transition: all 0.25s ease;
    }
    a:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; flex-shrink: 0;
    }
    .i-test    { background: rgba(99,102,241,0.22); }
    .i-termix  { background: rgba(239,68,68,0.18); }
    .i-grafana { background: rgba(34,197,94,0.18); }
    .i-runbook { background: rgba(251,191,36,0.18); }

    .link-text { text-align: left; }
    .link-label { display: block; font-weight: 600; font-size: 0.9rem; }
    .link-sub { display: block; font-size: 0.64rem; color: rgba(255,255,255,0.22); margin-top: 2px; }

    .arrow { margin-left: auto; opacity: 0.2; font-size: 0.8rem; transition: opacity 0.2s; }
    a:hover .arrow { opacity: 0.6; }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="card">
  <div class="logo">⚡</div>
  <h1>TestPlatform</h1>
  <div class="tagline">online testing infrastructure</div>

  <div class="links">
    <a href="/test">
      <div class="icon i-test">📝</div>
      <div class="link-text">
        <span class="link-label">Тесты</span>
        <span class="link-sub">yii2 · php-fpm · mysql</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="#" onclick="window.open('http://'+location.hostname+':8080');return false;">
      <div class="icon i-termix">⌨️</div>
      <div class="link-text">
        <span class="link-label">Termix</span>
        <span class="link-sub">сниппеты · быстрые команды</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="#" onclick="window.open('http://'+location.hostname+':3000');return false;">
      <div class="icon i-grafana">📊</div>
      <div class="link-text">
        <span class="link-label">Grafana</span>
        <span class="link-sub">метрики · дашборды · алерты</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="#" onclick="window.open('http://'+location.hostname+':8086');return false;">
      <div class="icon i-runbook">📚</div>
      <div class="link-text">
        <span class="link-label">Runbook</span>
        <span class="link-sub">документация · инциденты</span>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</div>

</body>
</html>
