services:

  mysql:
    image: mysql:8.0
    container_name: testplatform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - testplatform_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: testplatform_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - testplatform_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: testplatform_termix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - termix_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
    environment:
      TERMIX_WEB_PORT: "8080"
    networks:
      - testplatform_net

  fastapi:
    build: ./fastapi
    container_name: testplatform_fastapi
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./fastapi/app:/app/app
    ports:
      - "8000:8000"
    networks:
      - testplatform_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  yii2:
    build: ./yii2
    container_name: testplatform_yii2
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_SECRET: ${APP_SECRET}
    volumes:
      - ./yii2/config/db.php:/var/www/html/config/db.php
      - ./yii2/config/web.php:/var/www/html/config/web.php
      - ./yii2/config/php-fpm-status.conf:/usr/local/etc/php-fpm.d/zzz-status.conf:ro
      - ./yii2/config/php-fpm-status.conf:/usr/local/etc/php-fpm.d/zzz-status.conf:ro
      - yii2_code:/var/www/html
    networks:
      - testplatform_net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || kill -0 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: testplatform_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/static:/etc/nginx/static:ro
      - yii2_code:/var/www/html:ro
    networks:
      - testplatform_net
    depends_on:
      yii2:
        condition: service_healthy
      fastapi:
        condition: service_started

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: testplatform_nginx_exporter
    restart: unless-stopped
    command: --nginx.scrape-uri=http://nginx/nginx_status
    networks:
      - testplatform_net
    depends_on:
      - nginx

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: testplatform_mysql_exporter
    restart: unless-stopped
    command:
      - "--config.my-cnf=/etc/mysql-exporter/.my.cnf"
    volumes:
      - ./monitoring/mysql-exporter/.my.cnf:/etc/mysql-exporter/.my.cnf:ro
    networks:
      - testplatform_net
    depends_on:
      mysql:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: testplatform_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - testplatform_net
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: testplatform_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - testplatform_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: testplatform_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - testplatform_net
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.0
    container_name: testplatform_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    networks:
      - testplatform_net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: testplatform_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/fail2ban.log:/var/log/fail2ban.log:ro
    command: -config.file=/etc/promtail/promtail.yml
    group_add:
      - "988"
    networks:
      - testplatform_net
    depends_on:
      - loki
    # ====================== МОНИТОРИНГ ======================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: testplatform_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - testplatform_net

  php-fpm-exporter:
    image: hipages/php-fpm_exporter:latest
    container_name: testplatform_php_fpm_exporter
    environment:
      PHP_FPM_SCRAPE_URI: "tcp://yii2:9000/status"
    networks:
      - testplatform_net
    restart: unless-stopped
  # ======================================================

  notediscovery:
    image: ghcr.io/gamosoft/notediscovery:latest
    container_name: testplatform_notediscovery
    volumes:
      - ./notediscovery/data:/app/data:ro
    ports:
      - "8086:8000"
    networks:
      - testplatform_net
    restart: unless-stopped


volumes:
  mysql_data:
  redis_data:
  yii2_code:
  prometheus_data:
  grafana_data:
  loki_data:
  termix_data:


networks:
  testplatform_net:
    driver: bridge


 
